<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lysxria AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-bg: #212121;
            --sidebar-bg: #171717;
            --input-bg: #2f2f2f;
            --text-main: #ececf1;
            --text-soft: #b4b4b4;
            --user-bubble: #303030;
            --danger: #ff4d4d;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--main-bg); color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; overflow: hidden;
        }

        /* --- Yan Menü --- */
        #sidebar {
            width: 280px; background: var(--sidebar-bg); height: 100%;
            display: flex; flex-direction: column; padding: 15px;
            position: fixed; left: -280px; transition: 0.3s ease; z-index: 5000;
            box-sizing: border-box; border-right: 1px solid #333;
        }
        #sidebar.open { left: 0; }
        .sidebar-section { flex: 1; overflow-y: auto; margin: 15px 0; }
        .chat-item { padding: 12px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 5px; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item:hover { background: #2f2f2f; }
        .sidebar-link { padding: 10px; color: white; text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 14px; border-radius: 8px; }

        /* --- Profil Menüsü --- */
        #profile-menu {
            position: fixed; top: 70px; right: 15px; width: calc(100% - 30px); max-width: 300px;
            background: #171717; border-radius: 20px; padding: 25px;
            border: 1px solid #333; display: none; z-index: 6000;
        }
        #profile-menu.active { display: block; }
        .profile-line { margin-bottom: 15px; }
        .profile-line span { display: block; color: var(--text-soft); font-size: 12px; }

        /* --- Ana Alan --- */
        #main { flex: 1; display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; }
        #top-nav { height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }

        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px;
            width: 100%; max-width: 800px; margin: 0 auto; box-sizing: border-box;
        }

        .msg { max-width: 85%; padding: 14px 18px; border-radius: 20px; line-height: 1.5; font-size: 16px; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: var(--user-bubble); color: white; }
        .msg.ai { align-self: flex-start; background: transparent; color: white; padding-left: 0; }

        #welcome-hero { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 24px; font-weight: 500; padding: 0 20px; box-sizing: border-box; }

        /* --- Giriş Alanı --- */
        #input-container { width: 100%; padding: 20px; box-sizing: border-box; background: var(--main-bg); }
        .input-wrapper { max-width: 800px; margin: 0 auto; background: var(--input-bg); border-radius: 30px; padding: 10px 18px; display: flex; align-items: center; gap: 12px; }
        #userInput { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; resize: none; max-height: 120px; font-family: inherit; }
        
        .circle-btn { min-width: 38px; height: 38px; border-radius: 50%; border: none; background: #fff; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .icon-btn { color: var(--text-soft); font-size: 22px; cursor: pointer; }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 24px; border-radius: 30px; font-weight: bold; display: none; z-index: 9999; }
    </style>
</head>
<body>

    <div id="toast">Kopyalandı!</div>

    <div id="profile-menu">
        <div class="profile-line"><span>KULLANICI</span><strong>Eymen Yılmaz</strong></div>
        <div class="profile-line"><span>DURUM</span><strong>Aktif / Ücretsiz</strong></div>
        <button class="profile-btn" style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:10px;" onclick="toggleProfile()">Kapat</button>
    </div>

    <div id="sidebar">
        <div class="sidebar-link" onclick="startNewChat()" style="border: 1px solid #444; justify-content: center; cursor:pointer;">+ Yeni Sohbet</div>
        <div class="sidebar-section" id="history-container"></div>
        <div style="padding-top: 10px; border-top: 1px solid #333;">
            <a href="https://instagram.com/lysxria.sw" target="_blank" class="sidebar-link"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://discord.gg/WnYfCasd" target="_blank" class="sidebar-link"><i class="fab fa-discord"></i> Discord</a>
        </div>
    </div>

    <div id="main">
        <div id="top-nav">
            <i class="fa fa-bars icon-btn" onclick="toggleSidebar()"></i>
            <span style="font-weight: 600; font-size: 18px;">Lysxria AI</span>
            <div style="display: flex; gap: 20px;">
                <i class="fa fa-share-nodes icon-btn" onclick="copySiteLink()"></i>
                <i class="fa fa-circle-user icon-btn" onclick="toggleProfile()"></i>
            </div>
        </div>

        <div id="welcome-hero">Bu yapay zeka ECRİN için geliştirilmiştir.</div>
        <div id="chat-window"></div>

        <div id="input-container">
            <div class="input-wrapper">
                <i class="fa fa-paperclip icon-btn" onclick="copyLastAIResponse()"></i>
                <textarea id="userInput" rows="1" placeholder="Mesajınızı yazın..."></textarea>
                <button class="circle-btn" onclick="sendMessage()"><i class="fa fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
