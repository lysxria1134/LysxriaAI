<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lysxria AI PRO - Full Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-bg: #050000;
            --sidebar-bg: rgba(15, 0, 0, 0.98);
            --input-bg: rgba(45, 0, 0, 0.5);
            --accent-red: #9e0000;
            --glass: blur(25px);
            --panel-bg: rgba(25, 0, 0, 0.9);
        }

        * { font-family: 'Roboto', sans-serif; box-sizing: border-box; transition: all 0.3s ease; }

        body {
            margin: 0; height: 100vh; width: 100vw;
            background: linear-gradient(-45deg, #050000, #1a0000, #0a0000, #250000);
            background-size: 400% 400%;
            animation: gradientWave 15s ease infinite;
            color: #ececf1; display: flex; overflow: hidden;
        }

        @keyframes gradientWave { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* --- TANITIM YAZISI --- */
        #intro-text {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 500px; text-align: center; color: #888;
            font-size: 15px; line-height: 1.6; z-index: 5; pointer-events: none;
        }

        /* --- KAYIT & PROFİL SİSTEMİ --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 20000;
            backdrop-filter: blur(10px);
        }
        .auth-card {
            background: var(--panel-bg); padding: 40px; border-radius: 25px; width: 90%; max-width: 380px;
            text-align: center; border: 1px solid var(--accent-red);
        }
        .auth-card input {
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px;
            border: 1px solid #333; background: rgba(0,0,0,0.5); color: white;
        }
        .auth-card button {
            width: 100%; padding: 14px; background: var(--accent-red); color: #fff;
            border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 15px;
        }

        /* --- GUI PANELLERİ --- */
        .custom-gui {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.7);
            width: 85%; max-width: 360px; background: var(--panel-bg);
            backdrop-filter: var(--glass); border: 1px solid rgba(158, 0, 0, 0.4);
            border-radius: 25px; padding: 25px; z-index: 15000;
            display: none; opacity: 0; transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .custom-gui.open { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        
        .gui-header { font-weight: bold; text-align: center; color: var(--accent-red); margin-bottom: 20px; font-size: 18px; text-transform: uppercase; }
        .gui-btn { 
            width: 100%; padding: 15px; margin-bottom: 12px; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(158, 0, 0, 0.2); color: white; border-radius: 15px; cursor: pointer;
            display: flex; align-items: center; gap: 12px; font-size: 14px;
        }
        .gui-btn:hover { background: var(--accent-red); border-color: white; }

        /* --- İNTERNET GÖSTERGESİ --- */
        .net-bars { display: flex; gap: 3px; align-items: flex-end; height: 16px; }
        .bar { width: 3px; background: #333; border-radius: 1px; }
        .bar.green { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
        .bar.red { background: #ff0000; box-shadow: 0 0 8px #ff0000; }
        .bar1 { height: 4px; } .bar2 { height: 8px; } .bar3 { height: 12px; } .bar4 { height: 16px; }

        /* --- SOL MENÜ --- */
        #sidebar {
            width: 280px; background: var(--sidebar-bg); height: 100%; position: fixed; left: -280px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10000;
            border-right: 1px solid rgba(158, 0, 0, 0.3); padding: 20px; display: flex; flex-direction: column;
        }
        #sidebar.open { left: 0; }
        .side-title { font-size: 11px; color: #666; font-weight: 700; margin: 20px 0 10px 5px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .side-btn { padding: 12px; border-radius: 12px; color: #fff; display: flex; align-items: center; gap: 12px; font-size: 14px; cursor: pointer; margin-bottom: 5px; }
        .side-btn:hover { background: rgba(158, 0, 0, 0.15); color: var(--accent-red); }

        /* --- ANA ALAN --- */
        #main { flex: 1; display: flex; flex-direction: column; width: 100%; align-items: center; position: relative; }
        #chat-window { width: 100%; max-width: 800px; flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 14px 18px; border-radius: 20px; font-size: 15px; line-height: 1.5; }
        .msg.user { align-self: flex-end; background: var(--accent-red); }
        .msg.ai { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }

        .input-wrapper { width: 90%; max-width: 800px; background: var(--input-bg); border-radius: 30px; padding: 10px 22px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(158, 0, 0, 0.3); backdrop-filter: var(--glass); margin-bottom: 25px; position: relative; }
        #userInput { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; resize: none; }
        .circle-btn { min-width: 40px; height: 40px; border-radius: 50%; border: none; background: #fff; color: #000; cursor: pointer; font-size: 18px; }

        #mode-label { position: absolute; top: -20px; left: 30px; background: var(--accent-red); color: white; font-size: 10px; font-weight: bold; padding: 2px 10px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

    <div id="auth-overlay" onclick="if(event.target == this) this.style.display='none'">
        <div class="auth-card" onclick="event.stopPropagation()">
            <h1 style="color: var(--accent-red); margin-bottom: 25px;">LYSXRIA HESABI</h1>
            <p style="font-size: 12px; color: #888;">Lütfen bilgilerinizi kaydedin</p>
            <input type="text" id="reg-name" placeholder="İsim">
            <input type="email" id="reg-mail" placeholder="Gmail">
            <button onclick="authManager.register()">Kaydet ve Giriş Yap</button>
            <button onclick="document.getElementById('auth-overlay').style.display='none'" style="background:none; border:1px solid #333; margin-top:5px;">Vazgeç</button>
        </div>
    </div>

    <div id="intro-text">
        <span id="intro-content">Lysxria AI PRO'ya hoş geldiniz. Mesajlaşmaya başlayabilirsiniz.</span>
    </div>

    <div id="profile-gui" class="custom-gui">
        <div class="gui-header">PROFİL BİLGİLERİ</div>
        <div style="text-align:center; margin-bottom: 20px;">
            <div style="width:60px; height:60px; background:var(--accent-red); border-radius:50%; margin: 0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:25px; font-weight:bold;">L</div>
            <p id="p-display-name" style="font-size: 20px; font-weight: bold; margin: 0;"></p>
            <p id="p-display-mail" style="color: gray; font-size: 13px;"></p>
        </div>
        <button class="gui-btn" onclick="authManager.logout()" style="color: #ff4d4d;"><i class="fa fa-sign-out"></i> Hesabı Sil / Çıkış</button>
        <button class="gui-btn" onclick="closeGUI('profile-gui')">Kapat</button>
    </div>

    <div id="model-gui" class="custom-gui">
        <div class="gui-header">ZEKA MODU SEÇİN</div>
        <button class="gui-btn" onclick="uiManager.setMode('Hızlı', 'FAST')"><i class="fa fa-bolt"></i> Hızlı</button>
        <button class="gui-btn" onclick="uiManager.setMode('Pro', 'PRO')"><i class="fa fa-crown"></i> Pro</button>
        <button class="gui-btn" onclick="closeGUI('model-gui')">Kapat</button>
    </div>

    <div id="sidebar">
        <div class="side-btn" onclick="location.reload()" style="border: 1px solid var(--accent-red); justify-content:center; margin-bottom:15px;"><i class="fa fa-plus"></i> Yeni Sohbet</div>
        <div class="side-title">Ayarlar</div>
        <div class="side-btn" onclick="authManager.handleProfileClick()"><i class="fa fa-user"></i> Hesabım / Profil</div>
        <div class="side-btn" onclick="openGUI('model-gui')"><i class="fa fa-crown"></i> Zeka Modları</div>
    </div>

    <div id="main">
        <div style="width:100%; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 100;">
            <i class="fa fa-bars" style="cursor:pointer; color:var(--accent-red); font-size:22px" onclick="document.getElementById('sidebar').classList.add('open')"></i>
            <span style="font-weight: bold; color: var(--accent-red); letter-spacing:1.5px">LYSXRIA AI PRO</span>
            <div style="display: flex; align-items: center; gap: 18px;">
                <div class="net-bars">
                    <div class="bar bar1"></div> <div class="bar bar2"></div> <div class="bar bar3"></div> <div class="bar bar4"></div>
                </div>
                <i class="fa fa-circle-user" style="font-size: 22px; cursor:pointer" onclick="authManager.handleProfileClick()"></i>
            </div>
        </div>

        <div id="chat-window"></div>

        <div class="input-wrapper">
            <textarea id="userInput" rows="1" placeholder="Mesajınızı buraya bırakın..."></textarea>
            <button class="circle-btn" onclick="uiManager.sendMessage()"><i class="fa fa-arrow-up"></i></button>
        </div>
    </div>

    <script>
        // --- YENİ KAYIT VE PROFİL MANTIĞI ---
        const authManager = {
            // Profil tuşuna basıldığında ne olacağını belirler
            handleProfileClick: () => {
                const user = JSON.parse(localStorage.getItem('user'));
                if(user) {
                    // Eğer kayıtlıysa direkt profil panelini aç
                    document.getElementById('p-display-name').innerText = user.name;
                    document.getElementById('p-display-mail').innerText = user.mail;
                    openGUI('profile-gui');
                } else {
                    // Kayıtlı değilse kayıt ekranını göster
                    document.getElementById('auth-overlay').style.display = 'flex';
                }
            },

            register: () => {
                const name = document.getElementById('reg-name').value;
                const mail = document.getElementById('reg-mail').value;
                
                if(name.trim() && mail.trim()) {
                    localStorage.setItem('user', JSON.stringify({name, mail}));
                    document.getElementById('auth-overlay').style.display = 'none';
                    alert("Başarıyla kaydedildi! Artık profilinize bakabilirsiniz.");
                } else {
                    alert("Lütfen tüm alanları doldurun!");
                }
            },

            logout: () => {
                if(confirm("Bilgileriniz silinecek, emin misiniz?")) {
                    localStorage.removeItem('user');
                    location.reload();
                }
            }
        };

        // --- GUI FONKSİYONLARI ---
        function openGUI(id) {
            const el = document.getElementById(id);
            if(el) {
                el.style.display = 'block';
                setTimeout(() => el.classList.add('open'), 10);
                document.getElementById('sidebar').classList.remove('open');
            }
        }
        function closeGUI(id) {
            const el = document.getElementById(id);
            if(el) {
                el.classList.remove('open');
                setTimeout(() => el.style.display = 'none', 600);
            }
        }

        // İnternet Sinyali Efekti
        setInterval(() => {
            const bars = document.querySelectorAll('.bar');
            const strength = Math.floor(Math.random() * 4) + 1;
            bars.forEach((b, i) => {
                b.className = 'bar bar' + (i + 1);
                if(i < strength) strength === 1 ? b.classList.add('red') : b.classList.add('green');
            });
        }, 3000);

        // Sidebar kapatma
        window.onclick = (e) => {
            if(e.target.id === 'chat-window' || e.target.id === 'main') {
                document.getElementById('sidebar').classList.remove('open');
            }
        };
    </script>
    <script src="script.js"></script>
</body>
</html>
