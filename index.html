<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lysxria AI - Crimson Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-bg: #0a0000;
            --sidebar-bg: #1a0000;
            --input-bg: #2a0000;
            --accent-red: #800000;
            --text-main: #ececf1;
            --user-bubble: #4a0000;
        }

        /* --- Hareketli Arkaplan --- */
        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: linear-gradient(45deg, #0a0000, #2a0000, #0a0000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            font-family: sans-serif;
            display: flex; overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #sidebar {
            width: 280px; background: var(--sidebar-bg); height: 100%;
            position: fixed; left: -280px; transition: 0.3s; z-index: 5000;
            border-right: 1px solid var(--accent-red); padding: 15px; box-sizing: border-box;
        }
        #sidebar.open { left: 0; }

        /* --- GUI Tasarımları --- */
        .custom-gui {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 350px; background: #1a0000; border: 2px solid var(--accent-red);
            border-radius: 15px; padding: 20px; z-index: 7000; display: none; box-shadow: 0 0 20px rgba(128,0,0,0.5);
        }
        .close-gui { position: absolute; top: 10px; right: 10px; color: #ff0000; cursor: pointer; font-size: 20px; }
        
        .gui-btn { width: 100%; padding: 12px; margin: 10px 0; background: var(--accent-red); color: white; border: none; border-radius: 8px; cursor: pointer; }
        
        .star-rating { display: flex; justify-content: center; gap: 10px; margin: 15px 0; font-size: 25px; }
        .star-rating i { cursor: pointer; color: #444; }
        .star-rating i.active { color: #ffd700; }

        #main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; z-index: 10; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
        
        .msg { max-width: 85%; padding: 14px; border-radius: 15px; font-size: 16px; }
        .msg.user { align-self: flex-end; background: var(--user-bubble); border: 1px solid var(--accent-red); }
        .msg.ai { align-self: flex-start; background: rgba(255,255,255,0.05); }

        /* Sosyal Medya Renkleri */
        .insta-link { color: #E1306C !important; }
        .disco-link { color: #5865F2 !important; }

        #input-container { padding: 20px; }
        .input-wrapper { max-width: 800px; margin: 0 auto; background: var(--input-bg); border-radius: 30px; padding: 10px 18px; display: flex; align-items: center; border: 1px solid var(--accent-red); }
        #userInput { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; resize: none; }
        .circle-btn { background: #fff; border-radius: 50%; width: 35px; height: 35px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="lang-gui" class="custom-gui">
        <i class="fa fa-times close-gui" onclick="toggleGUI('lang-gui')"></i>
        <h3 style="text-align:center">Dil Seçimi / Language</h3>
        <button class="gui-btn" onclick="setLang('tr')">Türkçe</button>
        <button class="gui-btn" onclick="setLang('en')">English</button>
    </div>

    <div id="rate-gui" class="custom-gui">
        <i class="fa fa-times close-gui" onclick="toggleGUI('rate-gui')"></i>
        <h3 style="text-align:center">Değerlendir</h3>
        <div class="star-rating" id="stars">
            <i class="fa fa-star" onclick="rate(1)"></i>
            <i class="fa fa-star" onclick="rate(2)"></i>
            <i class="fa fa-star" onclick="rate(3)"></i>
            <i class="fa fa-star" onclick="rate(4)"></i>
            <i class="fa fa-star" onclick="rate(5)"></i>
        </div>
        <textarea id="rate-text" placeholder="Geri bildirimin..." style="width:100%; background:#000; color:white; border:1px solid #444; border-radius:5px; padding:5px; box-sizing:border-box;"></textarea>
        <button class="gui-btn" onclick="submitRate()">Gönder</button>
    </div>

    <div id="sidebar">
        <button class="gui-btn" onclick="toggleGUI('lang-gui')"><i class="fa fa-globe"></i> Dil Seçimi</button>
        <button class="gui-btn" onclick="toggleGUI('rate-gui')"><i class="fa fa-star"></i> Değerlendir</button>
        <div style="margin-top: 20px;">
            <a href="https://instagram.com/lysxria.sw" target="_blank" class="sidebar-link insta-link"><i class="fab fa-instagram"></i> Instagram</a><br><br>
            <a href="https://discord.gg/WnYfCasd" target="_blank" class="sidebar-link disco-link"><i class="fab fa-discord"></i> Discord</a>
        </div>
    </div>

    <div id="main">
        <div style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <i class="fa fa-bars" style="font-size:24px; cursor:pointer;" onclick="document.getElementById('sidebar').classList.toggle('open')"></i>
            <span style="font-weight:bold">Lysxria AI</span>
            <div></div>
        </div>
        <div id="chat-window"></div>
        <div id="input-container">
            <div class="input-wrapper">
                <textarea id="userInput" rows="1" placeholder="Mesajınızı yazın..."></textarea>
                <button class="circle-btn" onclick="sendMessage()"><i class="fa fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
