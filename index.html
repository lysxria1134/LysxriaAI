<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Lysxria AI - Chat System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-bg: #212121;
            --sidebar-bg: #171717;
            --input-bg: #2f2f2f;
            --text-main: #ececf1;
            --text-soft: #b4b4b4;
            --user-bubble: #303030;
            --danger: #ff4d4d;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--main-bg); color: var(--text-main);
            font-family: ui-sans-serif, -apple-system, sans-serif;
            display: flex; overflow: hidden;
        }

        /* --- Kayıt Modalı --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .auth-card {
            background: #171717; padding: 40px; border-radius: 20px; width: 380px;
            text-align: center; border: 1px solid #333;
        }
        .auth-card input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #444; background: #222; color: white; box-sizing: border-box;
        }
        .auth-card button {
            width: 100%; padding: 12px; background: #fff; color: #000;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px;
        }

        /* --- Yan Menü (Sidebar) --- */
        #sidebar {
            width: 280px; background: var(--sidebar-bg); height: 100%;
            display: flex; flex-direction: column; padding: 15px;
            position: fixed; left: -280px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000;
            box-sizing: border-box; border-right: 1px solid #333;
        }
        #sidebar.open { left: 0; }

        .sidebar-section { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .sidebar-title { font-size: 12px; color: var(--text-soft); font-weight: bold; margin: 15px 0 5px 5px; text-transform: uppercase; }
        
        .chat-item {
            padding: 10px; border-radius: 8px; cursor: pointer; font-size: 14px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: 0.2s;
        }
        .chat-item:hover { background: #2f2f2f; }

        .sidebar-link {
            padding: 10px; border-radius: 8px; text-decoration: none; color: white;
            display: flex; align-items: center; gap: 10px; font-size: 14px; margin-bottom: 5px;
        }
        .sidebar-link:hover { background: #2f2f2f; }

        /* --- Profil Menüsü (Sağ Üst) --- */
        #profile-menu {
            position: fixed; top: 70px; right: 20px; width: 280px;
            background: #171717; border-radius: 20px; padding: 25px;
            border: 1px solid #333; display: none; z-index: 2000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transform: scale(0.9); transition: 0.3s;
        }
        #profile-menu.active { display: block; transform: scale(1); }
        .profile-info { margin-bottom: 20px; font-size: 14px; }
        .profile-info span { display: block; color: var(--text-soft); margin-bottom: 5px; }
        .profile-info strong { font-size: 16px; word-break: break-all; }
        
        .profile-btn {
            width: 100%; padding: 10px; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-exit { background: var(--danger); color: white; }
        .btn-close { background: #333; color: white; }

        /* --- Ana Alan --- */
        #main { flex: 1; display: flex; flex-direction: column; height: 100vh; align-items: center; }
        #top-nav { width: 100%; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }

        #chat-window { width: 100%; max-width: 800px; flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; box-sizing: border-box; }
        
        #welcome-hero { position: absolute; top: 40%; text-align: center; font-size: 26px; font-weight: 500; }

        /* Mesaj Balonları */
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 20px; line-height: 1.6; font-size: 16px; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: var(--user-bubble); }
        .msg.ai { align-self: flex-start; background: transparent; padding-left: 0; }

        /* Giriş */
        #input-container { width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; }
        .input-wrapper { background: var(--input-bg); border-radius: 30px; padding: 10px 20px; display: flex; align-items: center; gap: 15px; }
        #userInput { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; resize: none; max-height: 150px; }
        
        .circle-btn { width: 35px; height: 35px; border-radius: 50%; border: none; background: #fff; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .icon-btn { color: #b4b4b4; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { color: white; }

        /* Bildirim Kutusu */
        #toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 10px 20px; border-radius: 20px;
            font-weight: bold; display: none; z-index: 5000;
        }
    </style>
</head>
<body>

    <div id="toast">Kopyalandı!</div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1>Lysxria AI</h1>
            <input type="text" id="reg-name" placeholder="İsim">
            <input type="email" id="reg-mail" placeholder="Gmail">
            <input type="password" id="reg-pass" placeholder="Şifre">
            <button onclick="handleRegister()">Başla</button>
        </div>
    </div>

    <div id="profile-menu">
        <div class="profile-info"><span>İsim</span><strong id="p-name">-</strong></div>
        <div class="profile-info"><span>Gmail</span><strong id="p-mail">-</strong></div>
        <div class="profile-info"><span>Şifre</span><strong id="p-pass">-</strong></div>
        <button class="profile-btn btn-exit" onclick="logout()"><i class="fa fa-sign-out"></i> Çıkış Yap</button>
        <button class="profile-btn btn-close" onclick="toggleProfile()"><i class="fa fa-times"></i> Kapat</button>
    </div>

    <div id="sidebar">
        <div class="sidebar-link" onclick="startNewChat()" style="border: 1px solid #333"><i class="fa fa-plus"></i> Yeni Sohbet</div>
        
        <div class="sidebar-title">Sohbet Geçmişi</div>
        <div id="history-container" class="sidebar-section"></div>

        <div class="sidebar-title">Diğer</div>
        <a href="https://instagram.com/lysxria.sw" target="_blank" class="sidebar-link"><i class="fab fa-instagram"></i> Instagram</a>
        <a href="https://discord.gg/WnYfCasd" target="_blank" class="sidebar-link"><i class="fab fa-discord"></i> Discord</a>
        <div class="sidebar-link"><i class="fa fa-language"></i> Dil Seçimi</div>
        <div class="sidebar-link"><i class="fa fa-moon"></i> Tema: Koyu</div>
        <div class="sidebar-link"><i class="fa fa-star"></i> Bizi Değerlendir</div>
    </div>

    <div id="main">
        <div id="top-nav">
            <div class="nav-left" style="display:flex; align-items:center; gap:15px; cursor:pointer" onclick="toggleSidebar()">
                <i class="fa fa-bars icon-btn"></i>
                <span style="font-weight:600; font-size:18px">Lysxria AI</span>
            </div>
            <div style="display:flex; gap:20px">
                <i class="fa fa-share icon-btn" onclick="copySiteLink()"></i>
                <i class="fa fa-circle-user icon-btn" onclick="toggleProfile()"></i>
            </div>
        </div>

        <div id="welcome-hero" id="welcomeText">Sen hazır olduğunda hazırım.</div>
        <div id="chat-window"></div>

        <div id="input-container">
            <div class="input-wrapper">
                <i class="fa fa-paperclip icon-btn" onclick="copyLastAIResponse()" title="Son cevabı kopyala"></i>
                <textarea id="userInput" rows="1" placeholder="Herhangi bir şey sor"></textarea>
                <button class="circle-btn" onclick="sendMessage()"><i class="fa fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
